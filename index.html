<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SignKey - Biométrie Gestuelle</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #0f172a; color: white; padding: 20px; }
        #video-wrapper { position: relative; width: 640px; height: 480px; margin: 20px auto; border: 4px solid #334155; border-radius: 20px; overflow: hidden; }
        #video, #canvas { position: absolute; top: 0; left: 0; transform: scaleX(-1); }
        #output-box { background: #1e293b; padding: 20px; border-radius: 10px; width: 600px; margin: auto; border: 1px solid #38bdf8; min-height: 50px; word-break: break-all; font-family: monospace; color: #38bdf8; font-size: 1.2rem; }
        button { background: #38bdf8; color: #0f172a; border: none; padding: 15px 30px; font-weight: bold; border-radius: 8px; cursor: pointer; font-size: 1rem; margin-bottom: 20px; transition: 0.3s; }
        button:hover { background: #7dd3fc; transform: translateY(-2px); }
    </style>
</head>
<body>

    <h1>🔐 SignKey</h1>
    <p>Click the button and make a sign to generate your unique key.</p>
    <p style="font-size: 0.9em; color: gray;">Created by Mohamed Iyad El Kabli</p>

    <div id="video-wrapper">
        <video id="video" width="640" height="480" autoplay playsinline></video>
        <canvas id="canvas" width="640" height="480"></canvas>
    </div>

    <button id="capture-btn">GENERATE MY PASSWORD</button>

    <div id="output-box" id="result-text">Waiting for your sign...</div>

    <script>
     const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const resultBox = document.getElementById('output-box');
        const btnLancer = document.getElementById('capture-btn');

        let dernierLandmarks = null;
        const dictionnaire = {
            "1 doigt": "agbvhf563#", "2 doigts": "hqjhf@23", "3 doigts": "moiel#2211",
            "Fermé": "lilelliidksiuy", "Ouvert": "97755432346778@86#421","Combo L": "LX78!zQ",
            "Combo Rock": "RK99#mP",
            "Combo Peace": "V2026*kL",
            "Combo Secret": "SPEC_44_&",
            "Combo Pince": "PINCE_99@",
            "Fermé": "lilelliidksiuy",
            "Ouvert": "97755432346778@86#421"
        };

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.8 });

       function identifierGeste(landmarks) {
            // Détection individuelle de chaque doigt
            const pouce = landmarks[4].x < landmarks[3].x; // Ajuster selon main gauche/droite
            const index = landmarks[8].y < landmarks[6].y;
            const majeur = landmarks[12].y < landmarks[10].y;
            const annulaire = landmarks[16].y < landmarks[14].y;
            const auriculaire = landmarks[20].y < landmarks[18].y;

            // --- NOUVELLE LOGIQUE DE COMBINAISONS (ACCORDS) ---
            
            // 1. Le "L" (Pouce + Index)
            if (pouce && index && !majeur && !annulaire && !auriculaire) return "Combo L";
            
            // 2. Le "Rock" (Index + Auriculaire)
            if (index && auriculaire && !majeur && !annulaire && !pouce) return "Combo Rock";
            
            // 3. Le "V" (Index + Majeur)
            if (index && majeur && !annulaire && !auriculaire && !pouce) return "Combo Peace";

            // 4. "Doigt d'honneur + Auriculaire" (Ta demande spécifique)
            if (majeur && auriculaire && !index && !annulaire && !pouce) return "Combo Secret";

            // 5. "Index + Pouce" (Pince)
            if (index && pouce && !majeur && !annulaire && !auriculaire) return "Combo Pince";

            // Par défaut, on garde les basiques si aucune combo n'est matchée
            const nb = [index, majeur, annulaire, auriculaire].filter(v => v).length;
            if (nb === 0) return "Fermé";
            if (nb === 4) return "Ouvert";
            
            return "Inconnu";
        }


        hands.onResults((results) => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (results.multiHandLandmarks && results.multiHandLandmarks[0]) {
                dernierLandmarks = results.multiHandLandmarks[0];
                drawConnectors(ctx, dernierLandmarks, HAND_CONNECTIONS, {color: 'rgba(56, 189, 248, 0.5)', lineWidth: 2});
            } else { dernierLandmarks = null; }
        });

        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        btnLancer.onclick = async () => {
            btnLancer.disabled = true;
            let sequence = [];
            resultBox.style.color = "#38bdf8";

            // BOUCLE DE 4 SIGNES (Complexité 625)
            for (let i = 1; i <= 4; i++) {
                for (let countdown = 2; countdown > 0; countdown--) {
                    resultBox.innerText = `PREPARE THE SIGN ${i}/4... (${countdown}s)`;
                    await sleep(1000);
                }

                if (dernierLandmarks) {
                    const geste = identifierGeste(dernierLandmarks);
                    sequence.push(geste);
                    resultBox.innerText = `Step ${i}/4 : VALIDATED ✔️`;
                    await sleep(800);
                } else {
                    resultBox.innerText = `⚠️ STEP FAILED ${i} (Main non détectée)`;
                    btnLancer.disabled = false;
                    return; 
                }
            }

            const mdpFinal = sequence.map(g => dictionnaire[g] || "").join('');
            
            navigator.clipboard.writeText(mdpFinal).then(() => {
                resultBox.style.color = "#10b981"; 
                resultBox.innerText = "🔒 HIGH SECURITY KEY GENERATED (625 COMBINATIONS)";
                btnLancer.innerText = "RESTART THE PROTOCOL";
                btnLancer.disabled = false;
            });

            setTimeout(() => { sequence = []; }, 5000);
        };

        const camera = new Camera(video, { onFrame: async () => { await hands.send({image: video}); }, width: 640, height: 480 });
        camera.start();
    </script>
</body>
</html>
